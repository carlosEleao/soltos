services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      APP_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: local-dev-change-me-please-use-long-secret
      DATABASE_URL: file:/app/data/civiclink.db
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:-NoicjhmNNauqAWEul+GimuTew7JWlfbiIdMwtxEVbRU=}
      PLAYWRIGHT_HEADLESS: "true"
    volumes:
      - civiclink_data:/app/data

volumes:
  civiclink_data:
